<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundo Homeopático - Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #062f27;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Newsreader', serif;
    overflow: hidden;
  }

  h1 {
    font-size: 3.5rem;
    font-weight: 300;
    font-style: italic;
    margin-bottom: 3rem;
  }

  /* === LOADER === */
  .loader {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: 55px;
    overflow: hidden;
  }

  /* Cada columna: ventana fija, el carousel se mueve dentro */
  .container {
    width: 50px;
    height: 55px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Track que se anima — BUG CORREGIDO: animacion aqui, no en .container */
  .carousel {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    position: absolute;
    width: 100%;
    align-items: center;
  }

  /* Columnas 1 y 3: bajan */
  .container:nth-child(1) .carousel,
  .container:nth-child(3) .carousel {
    animation: roll-down 2.5s cubic-bezier(0.45, 0, 0.55, 1) both;
  }

  /* Cada item del carousel */
  .icon {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon svg {
    width: 100%;
    height: 100%;
    fill: currentColor;
  }

  /* Columna 2 sube, con desfase mínimo */
  .container:nth-child(2) .carousel { animation: roll-up 2.5s cubic-bezier(0.45, 0, 0.55, 1) both; animation-delay: 0.1s; }
  .container:nth-child(3) .carousel { animation-delay: 0.2s; animation-fill-mode: both; }

  /* roll-down: iconos 1 y 3 deslizan hacia abajo y regresan */
  @keyframes roll-down {
    0%   { transform: translateY(0);    filter: blur(0);  }
    40%  { transform: translateY(56px); filter: blur(5px); }
    80%  { transform: translateY(0);    filter: blur(0);  }
    100% { transform: translateY(0);    filter: blur(0);  }
  }

  /* roll-up: icono 2 desliza hacia arriba y regresa */
  @keyframes roll-up {
    0%   { transform: translateY(0);     filter: blur(0);  }
    40%  { transform: translateY(-56px); filter: blur(5px); }
    80%  { transform: translateY(0);     filter: blur(0);  }
    100% { transform: translateY(0);     filter: blur(0);  }
  }
</style>
</head>
