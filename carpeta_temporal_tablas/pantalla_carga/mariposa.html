<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundo Homeopático - Mariposa</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #062f27;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Newsreader', serif;
    overflow: hidden;
  }

  h1 {
    font-size: 3.5rem;
    font-weight: 300;
    font-style: italic;
    margin-bottom: 3rem;
    opacity: 0.8;
  }

  /* === CONTENEDOR DE VUELO (FLYING AREA) === */
  .flying-container {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Animación de vuelo libre (errático suave) */
    animation: free-flight 6s ease-in-out infinite;
  }

  /* === LOADER (MARIPOSA) === */
  .loader {
    --sizeLoader: 80px;
    --sizeLoaderHalf: calc(var(--sizeLoader) / 2);
    display: flex;
    position: relative;
    flex-direction: row;
    justify-content: center;
    align-items: center;
    width: var(--sizeLoader);
    height: var(--sizeLoader);
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
  }

  /* Alas */
  .loader svg:nth-child(1) {
    position: relative;
    height: 100%;
    left: 2%;
    transform-origin: center right;
    animation: wing-left 0.4s ease-in-out infinite;
    fill: white;
  }

  .loader svg:nth-child(2) {
    height: 50%;
    fill: white;
    z-index: 2;
  }

  .loader svg:nth-child(3) {
    position: relative;
    height: 100%;
    left: -2%;
    transform-origin: center left;
    animation: wing-right 0.4s ease-in-out infinite;
    fill: white;
  }

  /* Animación de Aleteo */
  @keyframes wing-left {
    0%, 100% { transform: rotateY(0deg); }
    50% { transform: rotateY(55deg); }
  }

  @keyframes wing-right {
    0%, 100% { transform: rotateY(0deg); }
    50% { transform: rotateY(-55deg); }
  }

  /* Animación de Vuelo Libre (Movimiento errático elegante) */
  @keyframes free-flight {
    0% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(30px, -20px) rotate(5deg); }
    50% { transform: translate(-20px, -40px) rotate(-5deg); }
    75% { transform: translate(-40px, 10px) rotate(3deg); }
    100% { transform: translate(0, 0) rotate(0deg); }
  }

</style>
</head>
<body>

  <h1>Mundo Homeopático</h1>
